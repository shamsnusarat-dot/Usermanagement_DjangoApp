{% extends "users/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card text-center">
            <div class="card-body py-5 px-4">
                <div class="mb-3">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                </div>
                <h5 class="fw-bold">Delete User</h5>
                <p class="text-muted mb-1">You are about to delete:</p>
                <p class="fw-semibold fs-5 mb-1">{{ user.name }}</p>
                <p class="text-muted small mb-4">{{ user.email }}</p>
                <p class="text-danger small mb-4">This action cannot be undone.</p>
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash3 me-1"></i> Yes, Delete
                    </button>
                    <a href="{% url 'user-list-template' %}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-arrow-left me-1"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
