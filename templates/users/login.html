<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
        }
        .btn-microsoft {
            background-color: #2f2f2f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.2s;
        }
        .btn-microsoft:hover { background-color: #1a1a1a; color: white; }
        .ms-logo { width: 22px; height: 22px; }
    </style>
</head>
<body>
    <div class="login-card card p-5">
        <div class="text-center mb-4">
            <i class="bi bi-people-fill fs-1 text-primary"></i>
            <h4 class="fw-bold mt-2">User Management</h4>
            <p class="text-muted small">Sign in with your Microsoft account to continue</p>
        </div>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <a href="{{ auth_url }}" class="btn btn-microsoft w-100">
            <svg class="ms-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 23 23">
                <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
                <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
                <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
                <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
            </svg>
            Sign in with Microsoft
        </a>

        <p class="text-center text-muted small mt-4 mb-0">
            Only Microsoft Entra ID accounts are allowed.<br>
            Contact your admin if you cannot access.
        </p>
    </div>
</body>
</html>
